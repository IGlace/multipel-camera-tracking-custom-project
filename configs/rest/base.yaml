system:
  project_name: mcmt-platform
  output_root: outputs/rest
  require_gpu: true

logging:
  verbosity: normal
  log_to_file: true
  log_filename: rest_app.log

dataset:
  input_type: frame_folders
  root_dir: data
  camera_dirs: []
  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".webp"]
  video_extensions: [".mp4", ".avi", ".mov", ".mkv", ".webm"]
  sync_strategy: min_length

detector:
  backend: ultralytics
  model: yolo11n.pt
  confidence: 0.25
  iou: 0.45

segmentor:
  backend: ultralytics
  task: sam
  model: sam_b.pt
  confidence: 0.25
  iou: 0.45

local_tracker:
  backend: ultralytics
  tracker: botsort
  tracker_config:

reid:
  backend: mgn
  weights_path:
  normalize_embeddings: true

attributes:
  backend: person_attribute_recognition
  weights_path:
  attribute_names_path:

tracklet:
  window_size: 15
  min_length: 2
  idle_tolerance: 1

outputs:
  enable_mot: true
  enable_annotated_frames: true
  enable_annotated_video: false
  enable_live_display: false
  enable_graph_debug: false
  mot_subdir: mot
  annotated_frames_subdir: annotated_frames
  annotated_video_subdir: annotated_videos
  graph_debug_subdir: graph_debug
  live_display_window_name: MCMT Live Grid
  live_display_fullscreen: true
  video_fps: 20

graph_model:
  reasoning_mode: direct_score
  node_feature_components:
    - center_x
    - center_y
    - area
    - confidence
    - class_id
  spatial_edge_features:
    - center_similarity
    - iou
    - confidence_similarity
    - class_match
    - area_ratio_similarity
  temporal_edge_features:
    - center_similarity
    - confidence_similarity
    - class_match
    - area_ratio_similarity
  score_weights:
    center_similarity: 0.35
    iou: 0.35
    confidence_similarity: 0.10
    class_match: 0.10
    area_ratio_similarity: 0.10
  edge_score_threshold: 0.55
  temporal_match_threshold: 0.30
  direct_scorer:
    hidden_dims: [64, 32]
    output_dim: 1
    activation: relu
    norm: none
    dropout: 0.0
    residual: false
    activate_last: false
  gnn:
    aggregation: sum
    hybrid_fusion_alpha: 0.5
    node_encoder:
      hidden_dims: [128]
      output_dim: 64
      activation: relu
      norm: none
      dropout: 0.0
      residual: false
      activate_last: false
    edge_encoder:
      hidden_dims: [64]
      output_dim: 32
      activation: relu
      norm: none
      dropout: 0.0
      residual: false
      activate_last: false
    message_encoder:
      hidden_dims: [128]
      output_dim: 64
      activation: relu
      norm: none
      dropout: 0.0
      residual: false
      activate_last: false
    node_updater:
      hidden_dims: [128]
      output_dim: 64
      activation: relu
      norm: none
      dropout: 0.0
      residual: false
      activate_last: false
    edge_updater:
      hidden_dims: [64]
      output_dim: 32
      activation: relu
      norm: none
      dropout: 0.0
      residual: false
      activate_last: false
    predictor:
      hidden_dims: [32]
      output_dim: 1
      activation: relu
      norm: none
      dropout: 0.0
      residual: false
      activate_last: false
